# StreamForge local infrastructure (spec Phase 0).
# Brings up Kafka (via Redpanda), MinIO (S3), Prometheus, and Grafana, plus
# one-shot bootstrap jobs that create the Kafka topic and the MinIO bucket.
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092" # external Kafka API (host)
      - "9644:9644"   # admin
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: create the events topic with multiple partitions.
  topic-init:
    image: redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - rpk topic create events --partitions 6 --replicas 1 --brokers redpanda:9092 || true
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: create the streamforge bucket.
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/streamforge
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
